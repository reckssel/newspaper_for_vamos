name: Build Vamos Article Tool

# Manuell im "Actions"-Tab auf GitHub starten (Button "Run workflow").
# Erzeugt eine Windows-.exe und eine Mac-.app und stellt beide unter
# "Releases" zum Herunterladen bereit.

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version tag for this build (e.g. v1.0)"
        required: true
        default: "v1.0"

permissions:
  contents: write

jobs:

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install PyInstaller
        run: pip install pyinstaller

      - name: Build Windows executable
        run: pyinstaller --onefile --windowed --name VamosNewsTool vamos_article_tool.py

      - uses: actions/upload-artifact@v4
        with:
          name: VamosNewsTool-Windows
          path: dist/VamosNewsTool.exe

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install PyInstaller
        run: pip install pyinstaller

      - name: Build macOS app
        run: pyinstaller --onefile --windowed --name VamosNewsTool vamos_article_tool.py

      - name: Zip the .app bundle
        run: |
          cd dist
          zip -r VamosNewsTool-macOS.zip VamosNewsTool.app

      - uses: actions/upload-artifact@v4
        with:
          name: VamosNewsTool-macOS
          path: dist/VamosNewsTool-macOS.zip

  release:
    needs: [build-windows, build-macos]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release with both builds attached
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.version }}
          name: "Vamos Article Tool ${{ github.event.inputs.version }}"
          files: |
            artifacts/VamosNewsTool-Windows/VamosNewsTool.exe
            artifacts/VamosNewsTool-macOS/VamosNewsTool-macOS.zip
