<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vamos Newspaper</title>
    <link rel="stylesheet" href="css/index.css">
    <script src="js/index.js" defer></script>
</head>
<body>

  <div class="page">

    <header>
      <div class="header-top">
        <div class="logo" data-de="Logo" data-en="Logo" data-es="Logo">Logo</div>

        <button class="burger-btn" id="burgerBtn" type="button" aria-label="Menü öffnen" aria-expanded="false">
          <span></span>
          <span></span>
          <span></span>
        </button>
      </div>

      <nav class="site-nav" id="siteNav">
        <ul>
          <li><a href="#" class="nav-link active" data-filter="all" data-de="Home" data-en="Home" data-es="Inicio">Home</a></li>
          <li><a href="#" class="nav-link" data-filter="argentina" data-de="Argentinien" data-en="Argentina" data-es="Argentina">Argentinien</a></li>
          <li><a href="#" class="nav-link" data-filter="spain" data-de="Spanien" data-en="Spain" data-es="España">Spanien</a></li>
          <li class="lang-switch">
            <button class="lang-btn" type="button" data-de="Deutsch ▾" data-en="English ▾" data-es="Español ▾">Deutsch ▾</button>
            <ul class="lang-menu">
              <li><a href="#" data-lang="de">Deutsch</a></li>
              <li><a href="#" data-lang="en">English</a></li>
              <li><a href="#" data-lang="es">Español</a></li>
            </ul>
          </li>
        </ul>
      </nav>
    </header>

    <!-- Ticker + Kurse-Box nebeneinander, Ticker doppelt so breit -->
    <div class="top-row">

      <section class="ticker">
        <span class="ticker-label">Breaking News</span>
        <button id="prevBtn" aria-label="Vorherige Meldung">&lt;</button>
        <span class="ticker-text" id="tickerText">Lade News...</span>
        <button id="nextBtn" aria-label="Nächste Meldung">&gt;</button>
      </section>

      <aside class="market-box">
        <h3 data-de="Kurse" data-en="Markets" data-es="Cotizaciones">Kurse</h3>
        <p class="market-placeholder" data-de="Kommt bald: Gold, Öl, Indizes, Krypto"
           data-en="Coming soon: Gold, Oil, Indices, Crypto"
           data-es="Próximamente: Oro, Petróleo, Índices, Cripto">
          Kommt bald: Gold, Öl, Indizes, Krypto
        </p>
      </aside>

    </div>

    <!-- Artikel-Karten, aktualisieren sich automatisch -->
    <main>
      <div class="section-heading">
        <h2 data-de="Aktuelle Artikel" data-en="Latest Articles" data-es="Últimos Artículos">Aktuelle Artikel</h2>
        <span class="last-updated" id="lastUpdated"></span>
      </div>

      <div class="articles-grid" id="articlesGrid">
        <!-- Artikel-Karten werden per JS eingefügt -->
      </div>
    </main>

    <footer data-de="Footer" data-en="Footer" data-es="Pie de página">
      Footer
    </footer>

  </div>

</body>
</html>
